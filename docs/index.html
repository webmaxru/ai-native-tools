<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Native Development Skills</title>
  <meta name="description" content="Agent skill plugins for AI-native development, maintained by Maxim Salnikov">
  <meta property="og:title" content="AI-Native Development Skills">
  <meta property="og:description" content="Agent skill plugins for AI-native development — package management, deployment, browser AI, CMS integrations, and more.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    /* ── Reset & Variables ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body, h1, h2, h3, p { margin: 0; }

    :root {
      --color-bg: #0d0d12;
      --color-bg-secondary: #14141c;
      --color-bg-tertiary: #1c1c28;
      --color-border: #2d2d3d;
      --color-text: #e4e4ec;
      --color-text-muted: #9090a8;
      --color-text-emphasis: #ffffff;
      --color-link: #B870FF;
      --color-link-hover: #C898FD;
      --color-accent: #8534F3;
      --color-accent-hover: #B870FF;
      --color-accent-secondary: #FE4C25;
      --color-purple-light: #C898FD;
      --color-card-bg: rgba(20, 20, 28, 0.8);
      --color-card-hover: rgba(28, 28, 40, 0.9);
      --color-glass-border: rgba(255, 255, 255, 0.1);
      --color-success: #10b981;
      --gradient-primary: linear-gradient(180deg, #8534F3 0%, #B870FF 50%, #FE4C25 100%);
      --gradient-hero: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(133, 52, 243, 0.25), transparent),
                       radial-gradient(ellipse 60% 40% at 80% 50%, rgba(254, 76, 37, 0.12), transparent),
                       radial-gradient(ellipse 60% 40% at 20% 50%, rgba(184, 112, 255, 0.12), transparent);
      --border-radius: 8px;
      --border-radius-lg: 16px;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 12px 24px -10px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px -10px rgba(133, 52, 243, 0.5);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --container-width: 1200px;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;

      /* Plugin accent colors */
      --plugin-1: #B870FF;
      --plugin-1-glow: rgba(184, 112, 255, 0.4);
      --plugin-2: #FE4C25;
      --plugin-2-glow: rgba(254, 76, 37, 0.4);
      --plugin-3: #10b981;
      --plugin-3-glow: rgba(16, 185, 129, 0.4);
    }

    [data-theme="light"] {
      --color-bg: #fafafa;
      --color-bg-secondary: #ffffff;
      --color-bg-tertiary: #f5f5f7;
      --color-border: #e4e4e7;
      --color-text: #3f3f46;
      --color-text-muted: #52525b;
      --color-text-emphasis: #18181b;
      --color-link: #8534F3;
      --color-link-hover: #43179E;
      --color-card-bg: rgba(255, 255, 255, 0.9);
      --color-card-hover: rgba(255, 255, 255, 1);
      --color-glass-border: rgba(0, 0, 0, 0.12);
      --gradient-hero: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(133, 52, 243, 0.18), transparent),
                       radial-gradient(ellipse 60% 40% at 80% 50%, rgba(254, 76, 37, 0.10), transparent),
                       radial-gradient(ellipse 60% 40% at 20% 50%, rgba(184, 112, 255, 0.10), transparent);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 12px 24px -10px rgba(0, 0, 0, 0.12);
      --shadow-lg: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
      --shadow-glow: 0 0 40px -10px rgba(133, 52, 243, 0.3);
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --color-bg: #fafafa;
        --color-bg-secondary: #ffffff;
        --color-bg-tertiary: #f5f5f7;
        --color-border: #e4e4e7;
        --color-text: #3f3f46;
        --color-text-muted: #52525b;
        --color-text-emphasis: #18181b;
        --color-link: #8534F3;
        --color-link-hover: #43179E;
        --color-card-bg: rgba(255, 255, 255, 0.9);
        --color-card-hover: rgba(255, 255, 255, 1);
        --color-glass-border: rgba(0, 0, 0, 0.12);
        --gradient-hero: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(133, 52, 243, 0.18), transparent),
                         radial-gradient(ellipse 60% 40% at 80% 50%, rgba(254, 76, 37, 0.10), transparent),
                         radial-gradient(ellipse 60% 40% at 20% 50%, rgba(184, 112, 255, 0.10), transparent);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 12px 24px -10px rgba(0, 0, 0, 0.12);
        --shadow-lg: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
        --shadow-glow: 0 0 40px -10px rgba(133, 52, 243, 0.3);
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--color-link); text-decoration: none; transition: color var(--transition); }
    a:hover { color: var(--color-link-hover); }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    .container {
      max-width: var(--container-width);
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── Top Bar ───────────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 12px; right: 20px; z-index: 1000;
      display: flex; align-items: center; gap: 8px;
    }
    .top-search { position: relative; }
    .top-search input {
      width: 200px; padding: 8px 12px 8px 32px; font-size: 13px;
      background: var(--color-bg-secondary); border: 1px solid var(--color-border);
      border-radius: 20px; color: var(--color-text);
      transition: border-color 0.15s ease, box-shadow 0.15s ease, width 0.2s ease;
    }
    .top-search input:focus {
      outline: none; border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(133, 52, 243, 0.15);
      width: 280px;
    }
    .top-search input::placeholder { color: var(--color-text-muted); }
    .top-search .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--color-text-muted); pointer-events: none;
    }
    .search-results-count {
      text-align: center; margin-top: 8px;
      font-size: 13px; color: var(--color-text-muted); font-weight: 500;
    }
    .search-results-count.hidden { display: none; }

    /* ── Theme Toggle ─────────────────────────────────────── */
    .theme-toggle {
      flex-shrink: 0;
      width: 40px; height: 40px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all var(--transition);
      color: var(--color-text-muted);
    }
    .theme-toggle:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      box-shadow: var(--shadow-glow);
    }
    .theme-toggle svg { width: 20px; height: 20px; fill: currentColor; }
    .theme-toggle .icon-moon { display: block; }
    .theme-toggle .icon-sun { display: none; }
    [data-theme="light"] .theme-toggle .icon-moon { display: none; }
    [data-theme="light"] .theme-toggle .icon-sun { display: block; }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) .theme-toggle .icon-moon { display: none; }
      :root:not([data-theme="dark"]) .theme-toggle .icon-sun { display: block; }
    }

    /* ── Hero ─────────────────────────────────────────────── */
    .hero {
      padding: 48px 0 32px;
      text-align: center;
      position: relative;
      background: var(--gradient-hero);
    }
    .hero::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none; z-index: 1;
    }
    .hero .container { position: relative; z-index: 2; }
    .hero h1 {
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--color-purple-light) 0%, var(--color-accent) 50%, var(--color-accent-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline-block;
    }
    .hero-subtitle {
      font-size: clamp(14px, 2.5vw, 17px);
      color: var(--color-text-muted);
      max-width: 640px;
      margin: 0 auto 20px;
      line-height: 1.5;
    }
    .hero-cmd {
      display: inline-flex; align-items: center; gap: 8px;
      margin: 0 auto 20px;
      padding: 8px 16px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--border-radius);
      font-family: var(--font-mono); font-size: 13px;
      color: var(--color-text); cursor: pointer;
      transition: border-color var(--transition);
      max-width: 100%;
    }
    .hero-cmd:hover { border-color: var(--color-accent); }
    .hero-cmd .cmd-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hero-cmd .cmd-copy {
      flex-shrink: 0; width: 14px; height: 14px;
      color: var(--color-text-muted); transition: color var(--transition);
    }
    .hero-cmd:hover .cmd-copy { color: var(--color-accent); }
    .hero-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px; font-size: 14px; font-weight: 600;
      border-radius: var(--border-radius); border: 1px solid transparent;
      cursor: pointer; transition: all var(--transition); text-decoration: none;
    }
    .btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
    .btn-primary {
      background: var(--color-accent); color: #fff; border-color: transparent;
    }
    .btn-primary:hover {
      background: var(--color-accent-hover); transform: translateY(-1px);
      box-shadow: var(--shadow-glow); color: #fff;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
      color: var(--color-text); border-color: var(--color-glass-border);
    }
    .btn-secondary:hover {
      background: var(--color-bg-tertiary); border-color: var(--color-border); color: var(--color-text);
    }
    .btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
    .btn:active { transform: scale(0.97); }

    /* ── Plugins Section ──────────────────────────────────── */

    /* ── Plugin Sections ──────────────────────────────────── */
    .plugins-section { padding: 24px 0 80px; }

    .plugin-group { margin-bottom: 48px; }
    .plugin-header {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 0; margin-bottom: 20px;
      border-bottom: 1px solid var(--color-border);
      flex-wrap: wrap;
    }
    .plugin-indicator {
      width: 4px; height: 32px; border-radius: 2px;
      flex-shrink: 0;
    }
    .plugin-group:nth-child(1) .plugin-indicator { background: var(--plugin-1); }
    .plugin-group:nth-child(2) .plugin-indicator { background: var(--plugin-2); }
    .plugin-group:nth-child(3) .plugin-indicator { background: var(--plugin-3); }

    .plugin-info { flex: 1; min-width: 0; }
    .plugin-name {
      font-size: 22px; font-weight: 700; color: var(--color-text-emphasis);
      margin-bottom: 4px;
    }
    .plugin-desc {
      font-size: 14px; color: var(--color-text-muted); line-height: 1.5;
    }
    .plugin-cmd {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 6px;
      padding: 4px 10px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--border-radius);
      font-family: var(--font-mono); font-size: 12px;
      color: var(--color-text-muted); cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
    }
    .plugin-cmd:hover { border-color: var(--color-accent); color: var(--color-text); }
    .plugin-cmd .cmd-copy {
      flex-shrink: 0; width: 12px; height: 12px;
      color: inherit; opacity: 0.6;
    }
    .plugin-cmd:hover .cmd-copy { opacity: 1; }
    .plugin-badges {
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
    }
    .badge-count {
      background: linear-gradient(135deg, rgba(133, 52, 243, 0.2), rgba(184, 112, 255, 0.2));
      color: var(--color-purple-light);
    }
    .badge-repo {
      background: var(--color-bg-tertiary); color: var(--color-text-muted);
      text-decoration: none; transition: all var(--transition);
    }
    .badge-repo:hover {
      border-color: var(--color-accent); color: var(--color-link);
    }

    /* ── Skill Cards ──────────────────────────────────────── */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .skill-card {
      background: var(--color-card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--border-radius-lg);
      padding: 24px 24px 20px;
      min-height: 200px;
      display: flex; flex-direction: column; gap: 10px;
      transition: all var(--transition);
      position: relative;
      opacity: 0;
      animation: cardEnter 0.4s ease-out forwards;
    }
    .skill-card::before {
      content: '';
      position: absolute; top: 0; left: 0; width: 4px; height: 100%;
      background: var(--gradient-primary);
      border-radius: var(--border-radius-lg) 0 0 var(--border-radius-lg);
      opacity: 0; transition: opacity var(--transition), left var(--transition);
    }
    .skill-card:hover, .skill-card:focus-within {
      background: var(--color-card-hover);
      transform: translateX(4px);
      box-shadow: var(--shadow);
      border-radius: 0 var(--border-radius-lg) var(--border-radius-lg) 0;
    }
    .skill-card:hover::before, .skill-card:focus-within::before {
      opacity: 1; left: -4px;
    }
    .skill-card.hidden { display: none; }

    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .skill-card-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .skill-name {
      font-size: 16px; font-weight: 600; color: var(--color-text-emphasis);
    }
    .skill-version {
      flex-shrink: 0;
      padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: 700;
      background: linear-gradient(135deg, rgba(133, 52, 243, 0.2), rgba(184, 112, 255, 0.2));
      color: var(--color-purple-light);
      font-family: var(--font-mono);
    }

    .skill-description {
      font-size: 14px; color: var(--color-text-muted);
      line-height: 1.6;
      overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3;
      -webkit-box-orient: vertical;
      max-height: calc(3 * 1.6em);
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0s;
    }
    .skill-card:hover .skill-description,
    .skill-card:focus-within .skill-description {
      -webkit-line-clamp: unset; line-clamp: unset;
      max-height: 40em;
      transition: max-height 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s;
    }
    .skill-description.expanded {
      -webkit-line-clamp: unset; line-clamp: unset;
      max-height: none;
    }

    .skill-footer {
      display: flex; align-items: center; gap: 8px; margin-top: auto;
      flex-wrap: wrap;
    }
    .skill-tag {
      font-size: 11px; padding: 2px 8px;
      background-color: var(--color-bg-tertiary); border-radius: 12px;
      color: var(--color-text-muted);
    }
    .skill-link {
      margin-left: auto; font-size: 13px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .skill-link svg { width: 14px; height: 14px; }
    .skill-cmd {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--border-radius);
      font-family: var(--font-mono); font-size: 11px;
      color: var(--color-text-muted); cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
      overflow: hidden;
    }
    .skill-cmd:hover { border-color: var(--color-accent); color: var(--color-text); }
    .skill-cmd .cmd-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .skill-cmd .cmd-copy {
      flex-shrink: 0; width: 12px; height: 12px;
      color: inherit; opacity: 0.5;
    }
    .skill-cmd:hover .cmd-copy { opacity: 1; }
    .copy-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; background: var(--color-success); color: #fff;
      border-radius: var(--border-radius); font-size: 14px; font-weight: 500;
      z-index: 1100; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .copy-toast.visible { opacity: 1; }

    /* ── Footer ───────────────────────────────────────────── */
    .site-footer {
      padding: 32px 0; text-align: center;
      border-top: 1px solid var(--color-glass-border);
    }
    .site-footer p { font-size: 14px; color: var(--color-text-muted); }
    .site-footer a { color: var(--color-text-muted); }
    .site-footer a:hover { color: var(--color-accent); }
    .build-info { margin-top: 6px; font-size: 12px; opacity: 0.7; }

    /* ── Back to Top ──────────────────────────────────────── */
    .back-to-top {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      width: 44px; height: 44px;
      background: var(--color-bg-secondary); border: 1px solid var(--color-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; visibility: hidden;
      transition: all var(--transition); color: var(--color-text-muted);
    }
    .back-to-top.visible { opacity: 1; visibility: visible; }
    .back-to-top:hover {
      border-color: var(--color-accent); color: var(--color-accent);
      transform: translateY(-2px); box-shadow: var(--shadow-glow);
    }
    .back-to-top svg { width: 20px; height: 20px; fill: currentColor; }

    /* ── Empty State ──────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--color-text-muted);
    }
    .empty-state h3 { font-size: 18px; color: var(--color-text); margin-bottom: 8px; }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .hero { padding: 40px 0 24px; }
      .skills-grid { grid-template-columns: 1fr; }
      .plugin-header { flex-direction: column; align-items: flex-start; }
      .plugin-badges { margin-top: 8px; }
      .container { padding: 0 16px; }
      .top-bar { top: 8px; right: 12px; }
      .top-search input { width: 140px; font-size: 12px; }
      .top-search input:focus { width: 200px; }
      .theme-toggle { width: 36px; height: 36px; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 26px; }
      .hero-subtitle { font-size: 14px; }
      .hero-cmd { font-size: 11px; }
    }

    /* ── Reduced Motion ───────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .skill-card { animation: none !important; opacity: 1 !important; }
      .skill-card:hover { transform: none; }
      .btn:active { transform: none; }
      *, *::before, *::after { transition-duration: 0.01ms !important; }
    }

    /* ── Scrollbar ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-text-muted); }

    /* ── Selection ────────────────────────────────────────── */
    ::selection { background: rgba(133, 52, 243, 0.3); color: var(--color-text-emphasis); }

    /* ── Print ────────────────────────────────────────────── */
    @media print {
      .theme-toggle, .back-to-top, .search-section { display: none !important; }

    // ── Escape HTML ────────────────────────────────────────────
    function esc(str) {
      if (!str) return "";
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Highlight search matches ───────────────────────────────
    function highlight(text, query) {
      if (!query) return esc(text);
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const re = new RegExp(`(${escaped})`, "gi");
      return esc(text).replace(re, '<mark style="background:linear-gradient(135deg,rgba(99,102,241,0.3),rgba(236,72,153,0.3));color:inherit;padding:0 2px;border-radius:2px">$1</mark>');

              <div class="plugin-badges">
                <span class="badge badge-count">${filteredSkills.length} skill${filteredSkills.length === 1 ? "" : "s"}</span>
                <a href="${esc(plugin.repoUrl)}" class="badge badge-repo" target="_blank" rel="noopener">
                  ${esc(plugin.repo)}
                </a>
              </div>
            </div>
            <div class="skills-grid">
        `;

        filteredSkills.forEach((skill, si) => {
          const delay = si * 40;
          html += `
            <article class="skill-card" style="animation-delay:${delay}ms" role="listitem">
              <div class="skill-card-top">
                <span class="skill-name">${highlight(formatName(skill.name), query)}</span>
                ${skill.version ? `<span class="skill-version">v${esc(skill.version)}</span>` : ""}
              </div>
              <p class="skill-description" title="${esc(skill.description)}">${highlight(skill.description || "No description", query)}</p>
              <div class="skill-cmd" data-copy="true" title="Click to copy">
                <span class="cmd-text">${esc(skill.installCmd)}</span>
                <svg class="cmd-copy" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25zM5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25z"/></svg>
              </div>
              <div class="skill-footer">
                ${skill.license ? `<span class="skill-tag">${esc(skill.license)}</span>` : ""}
                ${skill.author ? `<span class="skill-tag">by ${esc(skill.author)}</span>` : ""}
                <a href="${esc(skill.githubUrl)}" class="skill-link" target="_blank" rel="noopener">
                  <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 010 1.5h-3.5a.25.25 0 00-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-3.5a.75.75 0 011.5 0v3.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-8.5C2 2.784 2.784 2 3.75 2zm6.854-.22a.75.75 0 011.22.53v4.25a.75.75 0 01-1.5 0V4.06L6.28 8.09a.75.75 0 01-1.06-1.06l4.05-4.03H6.75a.75.75 0 010-1.5h3.5l.354.22z"/></svg>
                  GitHub
                </a>
              </div>
            </article>
          `;
        });

        html += "</div></div>";
      });

      container.innerHTML = html || '<div class="empty-state"><h3>No skills found</h3><p>Try a different search term</p></div>';

      // Update results count
      if (lowerQuery) {
        resultsCount.textContent = `Showing ${totalVisible} of ${CATALOG.totalSkills} skills`;
        resultsCount.classList.remove("hidden");
      } else {
        resultsCount.classList.add("hidden");
      }
    }

    // ── Build Info ─────────────────────────────────────────────
    function renderBuildInfo() {
      if (!CATALOG?.generatedAt) return;
      const d = new Date(CATALOG.generatedAt);
      document.getElementById("build-info").textContent =
        `Last updated: ${d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })}`;
    }

    // ── Search ─────────────────────────────────────────────────
    const searchInput = document.getElementById("search-input");
    let searchTimeout;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => render(searchInput.value), 150);
    });

    // ── Theme Toggle ───────────────────────────────────────────
    const toggle = document.getElementById("theme-toggle");
    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      try { localStorage.setItem("theme", theme); } catch {}
    }
    toggle.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      const isDark = current === "dark" || (!current && window.matchMedia("(prefers-color-scheme: dark)").matches);
      setTheme(isDark ? "light" : "dark");
    });
    // Restore saved theme
    try {
      const saved = localStorage.getItem("theme");
      if (saved) setTheme(saved);
    } catch {}

    // ── Copy to clipboard ──────────────────────────────────────
    document.addEventListener("click", (e) => {
      const code = e.target.closest("[data-copy]");
      if (!code) return;
      const text = code.textContent.trim();
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById("copy-toast");
        toast.classList.add("visible");
        setTimeout(() => toast.classList.remove("visible"), 2000);
      });
    });

    // ── Back to Top ────────────────────────────────────────────
    const backToTop = document.getElementById("back-to-top");
    window.addEventListener("scroll", () => {
      backToTop.classList.toggle("visible", window.scrollY > 400);
    }, { passive: true });
    backToTop.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    // ── Init ───────────────────────────────────────────────────
    render("");
    renderBuildInfo();
  </script>
</body>
</html>
